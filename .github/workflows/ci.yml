name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate all SKILL.md frontmatter
        run: node scripts/validate-skills.js

  security-scan:
    name: Security gate (AgentShield)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Scan .claude/ configuration
        run: |
          # Run scan in text mode — text output format is stable and documented
          npx ecc-agentshield@latest scan --path .claude 2>/dev/null > scan-result.txt || true
          cat scan-result.txt
      - name: Check grade threshold
        run: |
          # Extract grade letter from text output: "Grade: B (72/100)" or similar
          grade=$(grep -oP 'Grade:\s+\K[A-F]' scan-result.txt | head -1 || echo "")
          score=$(grep -oP 'Grade:\s+[A-F]\s+\(\K[0-9]+' scan-result.txt | head -1 || echo "0")
          if [ -z "$grade" ]; then
            echo "Warning: could not parse AgentShield grade — skipping gate (network or format issue)"
            exit 0
          fi
          echo "Security grade: $grade ($score/100)"
          if [[ "$grade" == "D" || "$grade" == "F" ]]; then
            echo "Security grade below threshold (C required). Address critical/high findings."
            exit 1
          fi
          echo "Security gate: PASSED"

  static-scan-skills:
    name: Static scan all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run static scanner on each skill
        run: |
          FAILED=0
          for skill_dir in skills/*/; do
            skill=$(basename "$skill_dir")
            # Run scanner; use jq to extract verdict cleanly (avoids bash special-char issues)
            verdict=$(node skills/skill-audit/scripts/static-scan.js "$skill_dir" 2>/dev/null | jq -r '.verdict // "ERROR"' 2>/dev/null || echo "ERROR")
            if [ "$verdict" = "BLOCK" ]; then
              echo "BLOCK: $skill"
              FAILED=1
            elif [ "$verdict" = "FLAG" ]; then
              echo "FLAG:  $skill (review before merging)"
            else
              echo "PASS:  $skill"
            fi
          done
          exit $FAILED
