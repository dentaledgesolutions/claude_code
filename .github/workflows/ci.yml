name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Validate all SKILL.md frontmatter
        run: node scripts/validate-skills.js

  security-scan:
    name: Security gate (AgentShield + static fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Scan .claude/ configuration (AgentShield 1.4.0)
        run: |
          # Pinned to 1.4.0 — update deliberately, not via @latest
          npx ecc-agentshield@1.4.0 scan --path .claude 2>/dev/null > scan-result.txt || true
          cat scan-result.txt
      - name: Check AgentShield grade threshold
        run: |
          grade=$(grep -oP 'Grade:\s+\K[A-F]' scan-result.txt | head -1 || echo "")
          score=$(grep -oP 'Grade:\s+[A-F]\s+\(\K[0-9]+' scan-result.txt | head -1 || echo "0")
          if [ -z "$grade" ]; then
            echo "AgentShield unavailable or output unparseable — running static fallback scan."
            echo "AGENTSHIELD_UNAVAILABLE=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Security grade: $grade ($score/100)"
          if [[ "$grade" == "D" || "$grade" == "F" ]]; then
            echo "Security grade below threshold (C required). Address critical/high findings."
            exit 1
          fi
          echo "Security gate: PASSED (AgentShield)"
      - name: Fallback — static scan .claude/ when AgentShield unavailable
        if: env.AGENTSHIELD_UNAVAILABLE == 'true'
        run: |
          # Self-contained fallback using our own scanner (no external dependencies).
          # Covers: agent prompt injection, hardcoded secrets, overly broad permissions.
          # Not equivalent to the full 102-rule AgentShield scan — run project-audit locally for that.
          FAILED=0
          shopt -s nullglob

          # Scan agent files (prompt injection, persona override, secrets)
          for f in .claude/agents/*.md; do
            verdict=$(node skills/skill-audit/scripts/static-scan.js "$f" 2>/dev/null | jq -r '.verdict // "ERROR"' 2>/dev/null || echo "ERROR")
            [ "$verdict" = "BLOCK" ] && { echo "BLOCK: $(basename $f)"; FAILED=1; } || \
            [ "$verdict" = "FLAG"  ] && echo "FLAG:  $(basename $f) (review)" || \
            echo "PASS:  $(basename $f)"
          done

          # Scan settings files (wildcard permissions, hardcoded keys, hook injection)
          for f in .claude/settings.json .claude/settings.local.json; do
            [ -f "$f" ] || continue
            verdict=$(node skills/skill-audit/scripts/static-scan.js "$f" 2>/dev/null | jq -r '.verdict // "ERROR"' 2>/dev/null || echo "ERROR")
            [ "$verdict" = "BLOCK" ] && { echo "BLOCK: $(basename $f)"; FAILED=1; } || \
            [ "$verdict" = "FLAG"  ] && echo "FLAG:  $(basename $f) (review)" || \
            echo "PASS:  $(basename $f)"
          done

          [ $FAILED -eq 0 ] && echo "Static fallback: PASSED"
          exit $FAILED

  static-scan-skills:
    name: Static scan all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run static scanner on each skill
        run: |
          FAILED=0
          for skill_dir in skills/*/; do
            skill=$(basename "$skill_dir")
            verdict=$(node skills/skill-audit/scripts/static-scan.js "$skill_dir" 2>/dev/null | jq -r '.verdict // "ERROR"' 2>/dev/null || echo "ERROR")
            if [ "$verdict" = "BLOCK" ]; then
              echo "BLOCK: $skill"
              FAILED=1
            elif [ "$verdict" = "FLAG" ]; then
              echo "FLAG:  $skill (review before merging)"
            else
              echo "PASS:  $skill"
            fi
          done
          exit $FAILED
