name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    name: Validate skill frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Validate all SKILL.md frontmatter
        run: node scripts/validate-skills.js

  security-scan:
    name: Security gate (AgentShield + static fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Scan .claude/ configuration (AgentShield 1.4.0)
        run: |
          # Pinned to 1.4.0 — update deliberately, not via @latest
          npx ecc-agentshield@1.4.0 scan --path .claude 2>/dev/null > scan-result.txt || true
          cat scan-result.txt
      - name: Check AgentShield grade threshold
        run: |
          grade=$(grep -oP 'Grade:\s+\K[A-F]' scan-result.txt | head -1 || echo "")
          score=$(grep -oP 'Grade:\s+[A-F]\s+\(\K[0-9]+' scan-result.txt | head -1 || echo "0")
          if [ -z "$grade" ]; then
            echo "AgentShield unavailable or output unparseable — running static fallback scan."
            echo "AGENTSHIELD_UNAVAILABLE=true" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "Security grade: $grade ($score/100)"
          if [[ "$grade" == "D" || "$grade" == "F" ]]; then
            echo "Security grade below threshold (C required). Address critical/high findings."
            exit 1
          fi
          echo "Security gate: PASSED (AgentShield)"
      - name: Fallback — static scan .claude/agents/ when AgentShield unavailable
        if: env.AGENTSHIELD_UNAVAILABLE == 'true'
        run: |
          # Self-contained fallback: scan every agent file with our own scanner.
          # Covers the most critical attack surface (agent prompt injection) without
          # depending on the external ecc-agentshield package.
          FAILED=0
          shopt -s nullglob
          for agent_file in .claude/agents/*.md; do
            agent=$(basename "$agent_file")
            verdict=$(node skills/skill-audit/scripts/static-scan.js "$agent_file" 2>/dev/null | jq -r '.verdict // "ERROR"' 2>/dev/null || echo "ERROR")
            if [ "$verdict" = "BLOCK" ]; then
              echo "BLOCK: $agent"
              FAILED=1
            elif [ "$verdict" = "FLAG" ]; then
              echo "FLAG:  $agent (review before merging)"
            else
              echo "PASS:  $agent"
            fi
          done
          if [ $FAILED -eq 0 ]; then
            echo "Static fallback scan: PASSED (AgentShield was unavailable — run project-audit locally for full 102-rule scan)"
          fi
          exit $FAILED

  static-scan-skills:
    name: Static scan all skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run static scanner on each skill
        run: |
          FAILED=0
          for skill_dir in skills/*/; do
            skill=$(basename "$skill_dir")
            verdict=$(node skills/skill-audit/scripts/static-scan.js "$skill_dir" 2>/dev/null | jq -r '.verdict // "ERROR"' 2>/dev/null || echo "ERROR")
            if [ "$verdict" = "BLOCK" ]; then
              echo "BLOCK: $skill"
              FAILED=1
            elif [ "$verdict" = "FLAG" ]; then
              echo "FLAG:  $skill (review before merging)"
            else
              echo "PASS:  $skill"
            fi
          done
          exit $FAILED
